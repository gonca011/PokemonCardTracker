<!DOCTYPE html>
<html lang="pt-PT">
    <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Pokémon Card Tracker</title>
    <link
      rel="shortcut icon"
      type="image/x-icon"
      href="../img/poke-ball.png"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../css/Style.css" />
    <script src="../scripts/Tabs.js" defer></script>
    <script src="../scripts/local_storage_utils.js" defer></script>
    <script src="../scripts/perfil.js" defer></script>
    </head>

<body id="main">
        <header class="py-3 w-100">
            <img
            src="../img/poke-ball.png"
            alt="Pokémon Card Tracker Logo"
            width="35"
            height="35"
            />
            <span class="fw-bold fst-italic text-primary ms-2">Pokémon Card Tracker</span>
        </header>

        <button class="tablink" onclick="openPage('Pesquisa', this, 'red')" id="defaultOpen">Pesquisa</button>
        <button class="tablink" onclick="openPage('Coleção', this, 'green')">Coleção</button>
        <button class="tablink" onclick="openPage('ListaDesejos', this, 'blue')">Lista de Desejos</button>
        <button class="tablink" onclick="openPage('Perfil', this, 'orange')">Perfil</button>

        <div id="Pesquisa" class="tabcontent">
            <h3>Pesquisa</h3>
            <p>Procura por cartas Pokémon depois de escolheres uma Expansão.</p>
            <input type="text" class="pokemon-search" placeholder="Pesquisar cartas..." />

            <div id="myBtnContainer">

                    <!-- Expansões -->
                    <div class="dropdown-item1">
                        <button class="btn" onclick="toggleDropdown(this)">
                            Expansões
                        </button>

                        <div class="dropdown-content">
                            <input type="text"
                                placeholder="Procurar..."
                                onkeyup="filterFunction(this)">

                            <div class="expansionFilters"></div>

                        </div>
                    </div>

            </div>

                <!-- Portfolio Gallery Grid -->
                <div class="row cardContainer"></div>
        </div>

        <div id="Coleção" class="tabcontent">
            <h3>Coleção</h3>
            <p>A tua Coleção de Cartas Pokémon.</p>
            <input type="text" class="pokemon-search" placeholder="Pesquisar cartas na coleção..." />
                <div id="myBtnContainer">

                    <!-- Expansões -->
                    <div class="dropdown-item1">
                        <button class="btn" onclick="toggleDropdown(this)">
                            Expansões
                        </button>

                        <div class="dropdown-content">
                            <input type="text"
                                placeholder="Procurar..."
                                onkeyup="filterFunction(this)">

                            <div class="expansionFilters"></div>

                        </div>
                    </div>

                </div>

                <!-- Portfolio Gallery Grid -->
                <div class="row cardContainer"></div>
        </div>

        <div id="ListaDesejos" class="tabcontent">
            <h3>Lista de Desejos</h3>
            <p>Procura por cartas Pokémon depois de escolheres uma Expansão.</p>
            <input type="text" class="pokemon-search" placeholder="Pesquisar cartas..." />

            <div id="myBtnContainer">

                    <!-- Expansões -->
                    <div class="dropdown-item1">
                        <button class="btn" onclick="toggleDropdown(this)">
                            Expansões
                        </button>

                        <div class="dropdown-content">
                            <input type="text"
                                placeholder="Procurar..."
                                onkeyup="filterFunction(this)">

                            <div class="expansionFilters"></div>


                        </div>
                    </div>

            </div>
            <!-- Portfolio Gallery Grid -->
                <div class="row cardContainer" id="cardContainer"></div>
        </div>


        <div id="Perfil" class="tabcontent">
            <h3>Perfil</h3>
            <p>Edita o teu perfil.</p>
            <div class="container">
                <label for="profileName"><b>Nome</b></label>
                <input type="text" id="profileName">

                <label for="profileEmail"><b>Email</b></label>
                <input type="email" id="profileEmail">

                <button id="saveProfile" class="btn">
                    Guardar alterações
                </button>

                <button id="logoutButton" class="btn">
                    Logout
                </button>
            </div>
        </div>
    </body>
    </main>
    
</html>
